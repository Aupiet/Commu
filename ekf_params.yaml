# ============================================================
#  SLAM TOOLBOX
# ============================================================
slam_toolbox:
  ros__parameters:

    # --- 1. CONFIGURATION GÉNÉRALE ---
    use_sim_time: false
    scan_queue_size: 10
    tf_buffer_duration: 30.0
    transform_timeout: 0.5

    # --- 2. RÉSOLUTION ---
    resolution: 0.05
    max_laser_range: 12.0

    # --- 3. FILTRAGE DE L'ODOMÉTRIE ---
    minimum_travel_distance: 0.05
    minimum_travel_heading: 0.10
    minimum_time_interval: 0.5
    transform_publish_period: 0.05

    # --- 4. QUALITÉ DU MATCHING ---
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_score: 60.0

    # --- 5. FRAMES & TOPICS ---
    map_frame: map
    odom_frame: odom
    base_frame: base_link
    scan_topic: /scan
    mode: mapping

    # --- 6. CONFIG WIFI (QoS) ---
    qos_overrides:
      /scan:
        reliability: "best_effort"
        durability: "volatile"
        history: "keep_last"
        depth: 10

# ============================================================
#  EKF — FUSION ODOMÉTRIE + IMU
# ============================================================
ekf_filter_node:
  ros__parameters:

    odom0: "/odom_rf2o"
    odom0_config: [true, true, false,
                   false, false, true,
                   false, false, false,
                   false, false, false]

    imu0: "/imu/data"
    imu0_config: [false, false, false,
                  true, true, true,
                  false, false, true,
                  false, false, false]

    odom0_queue_size: 10
    imu0_queue_size: 10

    map_frame: "map"
    odom_frame: "odom"
    base_link_frame: "base_link"
    world_frame: "odom"

    frequency: 50.0
    two_d_mode: true

# ============================================================
#  NAV2 — PLANNER SERVER (A*)
# ============================================================
planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      use_astar: true          # true = A*, false = Dijkstra
      tolerance: 0.5           # tolérance d'arrivée en mètres
      allow_unknown: true      # autoriser navigation en zone inconnue

# ============================================================
#  NAV2 — COSTMAP GLOBALE (nourrit A*)
# ============================================================
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0        # Hz — planning lent, 1 Hz suffit
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.09           # 168mm / 2 = 84mm
      # Résolution identique à SLAM Toolbox — cohérence obligatoire
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.25     # marge sécurité autour des murs
        cost_scaling_factor: 3.0

# ============================================================
#  NAV2 — COSTMAP LOCALE (évitement obstacles dynamiques)
# ============================================================
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0       # Hz — tracking rapide
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_link
      robot_radius: 0.09
      resolution: 0.05
      rolling_window: true
      width: 3                     # fenêtre locale 3m x 3m
      height: 3
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.25
        cost_scaling_factor: 3.0

# ============================================================
#  NAV2 — CONTROLLER SERVER (Pure Pursuit)
# ============================================================
controller_server:
  ros__parameters:
    controller_frequency: 10.0     # Hz — cohérent avec costmap locale
    controller_plugins: ["FollowPath"]

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.15     # m/s — cohérent avec NAV_FORWARD_SPEED
      lookahead_dist: 0.4          # distance de visée en mètres
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 1.8
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      use_rotate_to_heading: true
      allow_reversing: false
      rotate_to_heading_min_angle: 0.785
      max_angular_accel: 3.2
      max_robot_pose_search_dist: 10.0

# ============================================================
#  NAV2 — BEHAVIOR SERVER (récupération blocages)
# ============================================================
behavior_server:
  ros__parameters:
    behavior_plugins:
      - "spin"
      - "back_up"
      - "wait"
    spin:
      plugin: "nav2_behaviors/Spin"
    back_up:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

# ============================================================
#  NAV2 — BT NAVIGATOR (orchestrateur)
# ============================================================
bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    navigate_to_pose:
      bt_xml_filename: "navigate_to_pose_w_replanning_and_recovery.xml"
    navigate_through_poses:
      bt_xml_filename: "navigate_through_poses_w_replanning_and_recovery.xml"